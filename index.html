<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="referrer" content="strict-origin-when-cross-origin" />
<title>My Watchlist</title>
<link rel="icon" type="image/svg+xml" href="./favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./styles.css?v=2" />
</head>
<body>

<div class="file-protocol-banner" id="file-banner" role="status" aria-live="polite">
  <div>
    <strong>Tip:</strong> You opened this page via <code>file://</code>. YouTube embeds can fail (Error 153).
    Run a local server: <code>python3 -m http.server 5173</code> then open <code>http://localhost:5173</code>.
  </div>
  <button type="button" id="file-banner-close" aria-label="Dismiss">✕</button>
</div>

<header>
  <h1><span id="header-title">My</span> <span>Watchlist</span></h1>
  <div class="header-filters">
  <div class="filters">
    <div class="list-selector-wrap" id="list-selector-wrap" style="display:none">
      <select id="list-selector" class="list-selector" title="Switch list">
        <option value="personal">My list</option>
      </select>
      <button type="button" id="copy-invite-btn" class="header-link header-link-btn" title="Copy invite link" style="display:none">Copy invite link</button>
      <button type="button" id="restore-btn" class="header-link header-link-btn" title="Copy all items from this shared list back to your personal list" style="display:none">Restore to my list</button>
      <button type="button" id="dedupe-btn" class="header-link header-link-btn" title="Remove from My list any items that are in this shared list" style="display:none">Remove duplicates from My list</button>
      <button type="button" id="move-all-btn" class="header-link header-link-btn" title="Copy all items to a shared list (keeps your list intact)" style="display:none">Copy all to shared list</button>
    </div>
    <div class="header-meta" id="header-meta"></div>
    <a href="./bookmarklet.html" class="header-link" title="Add titles from IMDb">+ from IMDb</a>
    <div id="auth-ui" class="auth-ui">
      <button type="button" id="sign-in-btn" class="auth-btn">Sign in with Google</button>
      <div id="signed-in" class="signed-in" style="display:none">
        <span id="user-email" class="user-email" title="Signed in as"></span>
        <button type="button" id="switch-account-btn" class="auth-btn auth-btn-ghost" title="Switch to another Google account">Switch</button>
        <button type="button" id="sign-out-btn" class="auth-btn auth-btn-outline">Sign out</button>
      </div>
    </div>
  </div>
  </div>
</header>

<main class="content">
  <div class="content-filters" id="content-filters">
    <div class="tab-group" role="tablist" aria-label="Watch status">
      <button type="button" class="tab" role="tab" aria-selected="false" aria-controls="grid" id="tab-recently-added" data-status="recently-added">
        Recently Added
      </button>
      <button type="button" class="tab active" role="tab" aria-selected="true" aria-controls="grid" id="tab-to-watch" data-status="to-watch">
        To Watch
      </button>
      <button type="button" class="tab" role="tab" aria-selected="false" aria-controls="grid" id="tab-watched" data-status="watched">
        Watched
      </button>
    </div>
    <div class="filter-group" role="radiogroup" aria-label="Filter titles">
      <input type="radio" name="typeFilter" id="filter-both" value="both" checked />
      <label for="filter-both">Both</label>
      <input type="radio" name="typeFilter" id="filter-movies" value="movie" />
      <label for="filter-movies">Movies</label>
      <input type="radio" name="typeFilter" id="filter-shows" value="show" />
      <label for="filter-shows">Series</label>
    </div>
    <div id="genre-filter-wrap" class="genre-filter-wrap" style="display:none"></div>
  </div>
  <div class="grid" id="grid"></div>
</main>

<div class="modal-bg" id="shared-modal" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="modal shared-modal">
    <div class="modal-header">
      <span class="modal-title" id="shared-modal-title">Create shared list</span>
      <button class="modal-close" id="shared-modal-close" aria-label="Close">&#x2715;</button>
    </div>
    <div class="shared-modal-body" id="shared-modal-body"></div>
  </div>
</div>

<div class="modal-bg" id="modal" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="modal-close" id="modal-close" aria-label="Close">&#x2715;</button>
    </div>
    <div class="video-wrap">
      <iframe id="modal-iframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>
<script type="module" src="./app.js?v=2"></script>
</body>
</html>
