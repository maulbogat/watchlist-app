<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add from IMDb - Watchlist</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    :root {
      --bg: #0a0a0c;
      --surface: #131317;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f0ede8;
      --muted: #9a9a9a;
      --accent: #e8c96a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 560px;
      margin: 4rem auto;
      padding: 0 1.25rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem;
    }
    h1 {
      margin: 0 0 0.45rem;
      font-size: 1.35rem;
    }
    p {
      margin: 0 0 0.9rem;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.95rem;
    }
    a.bookmarklet-drag {
      display: inline-block;
      margin: 0.2rem 0 0.9rem;
      padding: 0.62rem 0.95rem;
      border-radius: 8px;
      text-decoration: none;
      background: var(--accent);
      color: #0a0a0c;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
    }
    a.bookmarklet-drag:active { cursor: grabbing; }
    a.inline-link { color: var(--accent); }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Add from IMDb</h1>
      <p>Drag this button to your bookmarks bar. On an IMDb movie/show page, click that bookmark to add the title.</p>
      <p>
        <a
          class="bookmarklet-drag"
          href="javascript:(function(){var s=document.createElement('script');s.src='https://movie-trailer-site.vercel.app/bookmarklet.js?v=10';document.body.appendChild(s);})();"
        >Add to Watchlist</a>
      </p>
      <p><strong>Tip:</strong> If dragging from the app modal fails, drag from this page instead.</p>
      <p><a class="inline-link" href="/">Open watchlist app</a></p>
    </section>
  </main>
</body>
</html>
