# Environment variable checklist (Netlify UI + local .env): docs/netlify-environment.md
# Delete VITE_AXIOM_TOKEN and VITE_AXIOM_DATASET in Netlify — they are not used and break secret scanning.

[build]
  publish = "dist"
  command = "npm run build:react"
  functions = "netlify/functions"

# Daily TMDB → Firestore upcomingAlerts (3:00 UTC)
[functions."check-upcoming"]
  schedule = "0 3 * * *"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
